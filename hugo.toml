baseURL = 'https://eleanora-lyh.github.io/MyLearningNotes/'
languageCode = 'zh-cn'
title = 'My Learning Notes'
theme = 'PaperMod'
defaultContentLanguage = "zh-cn"
timeZone = "Asia/Shanghai"
enableEmoji = true

# 日期配置：自动从文件系统获取日期
enableGitInfo = true  # 设为 true 可从 Git 提交历史获取日期

[frontmatter]
  date = [":git", ":default", ":fileModTime"]  # date 优先使用 Git 首次提交
  lastmod = [":git", ":fileModTime", ":default"]  # lastmod 使用最后提交时间

  publishDate = [":default"]

[params]
  description = "个人学习笔记博客"
  author = "Eleanora"
  comments = true  # 全局启用评论
  
  # Google Analytics 配置
  # 请将下面的 G-XXXXXXXXXX 替换为你的 Google Analytics Measurement ID
  # 获取地址: https://analytics.google.com/
  googleAnalytics = "G-MV297YCMCZ"  # 例如: "G-XXXXXXXXXX"
  
  # 文章页面显示浏览量
  ShowPageViews = true
  
  # 在页面顶部显示站点统计（部署后才显示真实数据）
  ShowSiteStats = true
  
  # 启用搜索功能
  [params.homeInfoParams]
    Title = "欢迎来到我的学习笔记 👋"
    Content = "记录学习过程中的点滴"

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Eleanora-lyh"

  # 显示代码复制按钮
  [params.assets]
    disableHLJS = false

  # Giscus 评论系统配置
  # 需要先在 GitHub 仓库启用 Discussions 功能
  # 访问 https://giscus.app/zh-CN 获取配置参数
  [params.giscus]
    repo = "Eleanora-lyh/MyLearningNotes"
    repoId = "R_kgDOR3zQkg"  # 替换为你的 repo ID
    category = "Announcements"
    categoryId = "DIC_kwDOR3zQks4C57x0"  # 替换为你的 category ID
    mapping = "title"  # 使用文章标题而非 URL 路径，避免中文乱码
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    crossorigin = "anonymous"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    loading = "lazy"

# 菜单配置
[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "归档"
  url = "/archives/"
  weight = 3


[[menu.main]]
  name = "分类"
  url = "/categories/"
  weight = 4

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 5

[[menu.main]]
  name = "关于"
  url = "/about/"
  weight = 6

# 分类和标签
[taxonomies]
  category = "categories"
  tag = "tags"

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Markdown 配置
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true